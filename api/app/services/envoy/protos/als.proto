// Minimal subset of envoy access log protos — only the fields llmxy needs.
// Field numbers MUST match upstream envoy (forward/backward compatible by field
// number) — sourced from envoy/data/accesslog/v3 + envoy/service/accesslog/v3
// in github.com/envoyproxy/envoy. Anything we don't read is omitted; unknown
// fields are silently skipped by protobuf.
syntax = "proto3";

package llmxy.als;

import "google/protobuf/struct.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// ---- envoy.service.accesslog.v3.StreamAccessLogsMessage --------------------

message StreamAccessLogsMessage {
  message Identifier {
    Node node = 1;
    string log_name = 2;
  }
  message HTTPAccessLogEntries {
    repeated HTTPAccessLogEntry log_entry = 1;
  }
  message TCPAccessLogEntries {}  // ignored

  Identifier identifier = 1;
  oneof log_entries {
    HTTPAccessLogEntries http_logs = 2;
    TCPAccessLogEntries tcp_logs = 3;
  }
}

message StreamAccessLogsResponse {}

message Node {
  string id = 1;
  string cluster = 2;
}

// ---- envoy.data.accesslog.v3.HTTPAccessLogEntry ----------------------------

// envoy.data.accesslog.v3.HTTPAccessLogEntry.HTTPVersion
enum HTTPVersion {
  PROTOCOL_UNSPECIFIED = 0;
  HTTP10 = 1;
  HTTP11 = 2;
  HTTP2 = 3;
  HTTP3 = 4;
}

message HTTPAccessLogEntry {
  AccessLogCommon common_properties = 1;
  HTTPVersion protocol_version = 2;
  HTTPRequestProperties request = 3;
  HTTPResponseProperties response = 4;
}

// Subset of envoy.data.accesslog.v3.AccessLogCommon — only the fields the
// admin access-log view + billing need. Unknown fields stay on the wire.
message AccessLogCommon {
  google.protobuf.Timestamp start_time = 5;
  Address upstream_remote_address = 13;
  string upstream_cluster = 15;
  ResponseFlags response_flags = 16;
  Metadata metadata = 17;
  google.protobuf.Duration duration = 23;
}

// envoy.config.core.v3.Metadata
message Metadata {
  // map<string, google.protobuf.Struct> filter_metadata
  map<string, google.protobuf.Struct> filter_metadata = 1;
}

// envoy.config.core.v3.Address — only socket_address is decoded.
message Address {
  oneof address {
    SocketAddress socket_address = 1;
  }
}

message SocketAddress {
  string address = 1;
  oneof port_specifier {
    uint32 port_value = 3;
  }
}

// envoy.data.accesslog.v3.ResponseFlags — bools mirror envoy's short codes
// used in %RESPONSE_FLAGS% substitution. Field 13 is a message (Unauthorized)
// in upstream; we decode it as an opaque message wrapper purely for HasField
// checks (we don't read its reason).
message ResponseFlags {
  message Unauthorized {}
  bool failed_local_healthcheck = 1;
  bool no_healthy_upstream = 2;
  bool upstream_request_timeout = 3;
  bool local_reset = 4;
  bool upstream_remote_reset = 5;
  bool upstream_connection_failure = 6;
  bool upstream_connection_termination = 7;
  bool upstream_overflow = 8;
  bool no_route_found = 9;
  bool delay_injected = 10;
  bool fault_injected = 11;
  bool rate_limited = 12;
  Unauthorized unauthorized_details = 13;
  bool rate_limit_service_error = 14;
  bool downstream_connection_termination = 15;
  bool upstream_retry_limit_exceeded = 16;
  bool stream_idle_timeout = 17;
  bool invalid_envoy_request_headers = 18;
  bool downstream_protocol_error = 19;
  bool upstream_max_stream_duration_reached = 20;
  bool response_from_cache_filter = 21;
  bool no_filter_config_found = 22;
  bool duration_timeout = 23;
  bool upstream_protocol_error = 24;
  bool no_cluster_found = 25;
  bool overload_manager = 26;
  bool dns_resolution_failure = 27;
}

// envoy.config.core.v3.RequestMethod enum — used by HTTPRequestProperties.
enum RequestMethod {
  METHOD_UNSPECIFIED = 0;
  GET = 1;
  HEAD = 2;
  POST = 3;
  PUT = 4;
  DELETE = 5;
  CONNECT = 6;
  OPTIONS = 7;
  TRACE = 8;
  PATCH = 9;
}

message HTTPRequestProperties {
  RequestMethod request_method = 1;
  string scheme = 2;
  string authority = 3;
  string path = 5;
  string user_agent = 6;
  string forwarded_for = 8;
  string request_id = 9;
  string original_path = 10;
  uint64 request_body_bytes = 12;
  // upstream: request_headers = 13 (map<string,string>). Envoy populates this
  // from `additional_request_headers_to_log`.
  map<string, string> request_headers = 13;
}

message HTTPResponseProperties {
  // envoy uses google.protobuf.UInt32Value here; for parsing we can use a
  // raw uint32 message — but protobuf doesn't auto-unwrap. Use a wrapper.
  UInt32Value response_code = 1;
  uint64 response_body_bytes = 3;
  map<string, string> response_headers = 4;
}

message UInt32Value {
  uint32 value = 1;
}

// ---- service ---------------------------------------------------------------
// Must match envoy.service.accesslog.v3.AccessLogService so envoy can call us.
// gRPC method dispatch is by string path
// ("/envoy.service.accesslog.v3.AccessLogService/StreamAccessLogs"), not by
// proto package, so we declare the service under that fully-qualified name
// by using a wrapper at runtime (see als_server.py register_path).

service AccessLogService {
  rpc StreamAccessLogs(stream StreamAccessLogsMessage) returns (StreamAccessLogsResponse);
}
