resources:
- '@type': type.googleapis.com/envoy.config.listener.v3.Listener
  name: llmxy_listener
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9000
  filter_chains:
  - filters:
    - name: envoy.filters.network.http_connection_manager
      typed_config:
        '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        stat_prefix: ingress_http
        codec_type: AUTO
        rds:
          route_config_name: llmxy_routes
          config_source:
            path_config_source:
              path: /Users/wilsonwu/wilsonwudata/mycode/llmxy/api/var/envoy/ins1/rds.yaml
              watched_directory:
                path: /Users/wilsonwu/wilsonwudata/mycode/llmxy/api/var/envoy/ins1
            resource_api_version: V3
        access_log:
        - name: envoy.access_loggers.open_telemetry
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.access_loggers.grpc.v3.HttpGrpcAccessLogConfig
            common_config:
              log_name: llmxy_relay
              grpc_service:
                envoy_grpc:
                  cluster_name: als
              transport_api_version: V3
            additional_request_headers_to_log:
            - x-llmxy-request-id
            - x-llmxy-user-id
            - x-llmxy-api-key-id
            - x-llmxy-model-id
            - x-llmxy-user-facing-model
            - x-llmxy-upstream-model
            - x-llmxy-provider-type
            - x-llmxy-cluster
        http_filters:
        - name: envoy.filters.http.ext_authz
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
            transport_api_version: V3
            http_service:
              server_uri:
                uri: http://127.0.0.1:8000
                cluster: ext_authz
                timeout: 5s
              path_prefix: /internal/relay/authz
              authorization_request:
                allowed_headers:
                  patterns:
                  - exact: authorization
                  - exact: content-type
                  - exact: x-request-id
              authorization_response:
                allowed_upstream_headers:
                  patterns:
                  - prefix: x-llmxy-
                  - exact: authorization
                  - exact: x-api-key
                  - exact: anthropic-version
            with_request_body:
              max_request_bytes: 131072
              allow_partial_message: false
              pack_as_bytes: true
            failure_mode_allow: false
            clear_route_cache: true
        - name: envoy.filters.http.lua
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inline_code: "\nlocal cjson_ok, cjson = pcall(require, \"cjson\")\nlocal\
              \ function parse_usage_from_json(s)\n  if not cjson_ok then return nil\
              \ end\n  local ok, obj = pcall(cjson.decode, s)\n  if not ok or type(obj)\
              \ ~= \"table\" then return nil end\n  local u = obj.usage\n  if type(u)\
              \ ~= \"table\" then return nil end\n  return tonumber(u.prompt_tokens)\
              \ or 0, tonumber(u.completion_tokens) or 0\nend\n\nfunction envoy_on_request(handle)\n\
              \  local path = handle:headers():get(\":path\") or \"\"\n  if not string.find(path,\
              \ \"/v1/chat/completions\", 1, true) then return end\n  local body =\
              \ handle:body()\n  if not body then return end\n  local raw = body:getBytes(0,\
              \ body:length())\n  if not raw or #raw == 0 then return end\n  if not\
              \ cjson_ok then return end\n  local ok, obj = pcall(cjson.decode, raw)\n\
              \  if not ok or type(obj) ~= \"table\" then return end\n  if obj.stream\
              \ == true then\n    obj.stream_options = obj.stream_options or {}\n\
              \    obj.stream_options.include_usage = true\n    local out = cjson.encode(obj)\n\
              \    body:setBytes(out)\n    handle:headers():replace(\"content-length\"\
              , tostring(#out))\n  end\nend\n\nfunction envoy_on_response(handle)\n\
              \  local ct = (handle:headers():get(\"content-type\") or \"\"):lower()\n\
              \  local body = handle:body()\n  if not body then return end\n  local\
              \ len = body:length()\n  if len == 0 then return end\n  local raw =\
              \ body:getBytes(0, len)\n  local pt, ct_tok = 0, 0\n  if string.find(ct,\
              \ \"text/event-stream\", 1, true) then\n    -- scan for last `data:\
              \ {...}` payload containing \"usage\"\n    local last_usage_payload\
              \ = nil\n    for payload in string.gmatch(raw, \"data:%s*({[^\\n]+})\"\
              ) do\n      if string.find(payload, \"\\\"usage\\\"\", 1, true) then\n\
              \        last_usage_payload = payload\n      end\n    end\n    if last_usage_payload\
              \ then\n      pt, ct_tok = parse_usage_from_json(last_usage_payload)\n\
              \    end\n  else\n    pt, ct_tok = parse_usage_from_json(raw)\n  end\n\
              \  if (pt or 0) > 0 or (ct_tok or 0) > 0 then\n    handle:streamInfo():dynamicMetadata():set(\n\
              \      \"llmxy.usage\", \"prompt_tokens\", pt or 0\n    )\n    handle:streamInfo():dynamicMetadata():set(\n\
              \      \"llmxy.usage\", \"completion_tokens\", ct_tok or 0\n    )\n\
              \  end\nend\n"
        - name: envoy.filters.http.router
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        stream_idle_timeout: 0s
        request_timeout: 0s
