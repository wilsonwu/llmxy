# =============================================================================
# llmxy remote envoy — all-in-one Kubernetes manifest
# =============================================================================
# Deploys a single envoy that connects to the llmxy control plane as a remote
# xDS node. Only standard k8s objects (ConfigMap + Deployment + Service); no
# operators, no CRDs, no Helm, no kustomize required.
#
# ---- HOW TO USE -------------------------------------------------------------
# 1. In the llmxy admin UI, create a remote envoy instance and copy its node_id.
# 2. Edit the four LLMXY_* env vars in the Deployment below (search "EDIT ME").
# 3. kubectl apply -f kubernetes.yaml
# 4. Confirm in admin UI: instance turns green within a few seconds.
#
# No need to copy the full bootstrap.yaml — the template embedded in the
# ConfigMap is identical to what the UI generates; the four env vars below
# are the only per-instance values, substituted at container start via sed.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: llmxy-envoy-bootstrap
  labels:
    app: llmxy-envoy
data:
  bootstrap.template.yaml: |
    node:
      id: __LLMXY_NODE_ID__
      cluster: llmxy-remote
    admin:
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
    dynamic_resources:
      ads_config:
        api_type: GRPC
        transport_api_version: V3
        set_node_on_first_message_only: true
        grpc_services:
          - envoy_grpc:
              cluster_name: xds_cluster
            initial_metadata:
              - { key: x-llmxy-token, value: __LLMXY_TOKEN__ }
      cds_config: { ads: {}, resource_api_version: V3 }
      lds_config: { ads: {}, resource_api_version: V3 }
    static_resources:
      clusters:
        - name: xds_cluster
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_PREFERRED
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config: { http2_protocol_options: {} }
          load_assignment:
            cluster_name: xds_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: __LLMXY_CONTROL_PLANE_HOST__
                          port_value: __LLMXY_XDS_PORT__
        - name: als_cluster
          type: STRICT_DNS
          connect_timeout: 5s
          dns_lookup_family: V4_PREFERRED
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config: { http2_protocol_options: {} }
          load_assignment:
            cluster_name: als_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: __LLMXY_CONTROL_PLANE_HOST__
                          port_value: __LLMXY_ALS_PORT__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmxy-envoy
  labels:
    app: llmxy-envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llmxy-envoy
  template:
    metadata:
      labels:
        app: llmxy-envoy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.37.2
          env:
            # ---------- EDIT ME ----------
            - name: LLMXY_NODE_ID
              value: "llmxy-remote-CHANGEME"     # from admin UI instance row
            - name: LLMXY_TOKEN
              value: "CHANGEME"                  # control plane XDS_AUTH_TOKEN
            - name: LLMXY_CONTROL_PLANE_HOST
              value: "control-plane.example.com" # reachable from this pod
            - name: LLMXY_XDS_PORT
              value: "8003"
            - name: LLMXY_ALS_PORT
              value: "8002"
            # -----------------------------
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              sed \
                -e "s|__LLMXY_NODE_ID__|${LLMXY_NODE_ID}|g" \
                -e "s|__LLMXY_TOKEN__|${LLMXY_TOKEN}|g" \
                -e "s|__LLMXY_CONTROL_PLANE_HOST__|${LLMXY_CONTROL_PLANE_HOST}|g" \
                -e "s|__LLMXY_XDS_PORT__|${LLMXY_XDS_PORT}|g" \
                -e "s|__LLMXY_ALS_PORT__|${LLMXY_ALS_PORT}|g" \
                /etc/envoy-template/bootstrap.template.yaml > /tmp/bootstrap.yaml
              exec envoy -c /tmp/bootstrap.yaml --log-level info
          ports:
            - name: client
              containerPort: 9000
            - name: admin
              containerPort: 9901
          readinessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: bootstrap
              mountPath: /etc/envoy-template
              readOnly: true
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: "2",  memory: 1Gi }
      volumes:
        - name: bootstrap
          configMap:
            name: llmxy-envoy-bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: llmxy-envoy
  labels:
    app: llmxy-envoy
spec:
  # Switch to ClusterIP / NodePort if your environment doesn't provision LBs.
  type: LoadBalancer
  selector:
    app: llmxy-envoy
  ports:
    - name: client
      port: 80
      targetPort: client
    # Optional: expose admin only via in-cluster Service for the control plane
    # to reach /ready and /stats. Comment out if not required.
    - name: admin
      port: 9901
      targetPort: admin
