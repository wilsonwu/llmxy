apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmxy-envoy
  namespace: default
  labels:
    app: llmxy-envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llmxy-envoy
  template:
    metadata:
      labels:
        app: llmxy-envoy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.31-latest
          args:
            - envoy
            - -c
            - /etc/envoy/bootstrap.yaml
            - --log-level
            - info
          ports:
            - name: client
              containerPort: 9000
            - name: admin
              containerPort: 9901
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/envoy
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: llmxy-envoy
---
apiVersion: v1
kind: Service
metadata:
  name: llmxy-envoy
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: llmxy-envoy
  ports:
    - name: client
      port: 80
      targetPort: client
