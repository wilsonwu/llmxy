# Envoy bootstrap template for llmxy remote-mode deployments.
#
# Placeholders (__LLMXY_*__) are substituted at container start via sed using
# environment variables set on the docker-compose / k8s side. Do not edit this
# file directly — change the env vars in docker-compose.yaml / kubernetes.yaml.
node:
  id: __LLMXY_NODE_ID__
  cluster: llmxy-remote
admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }
dynamic_resources:
  ads_config:
    api_type: GRPC
    transport_api_version: V3
    set_node_on_first_message_only: true
    grpc_services:
      - envoy_grpc:
          cluster_name: xds_cluster
        initial_metadata:
          - { key: x-llmxy-token, value: __LLMXY_TOKEN__ }
  cds_config: { ads: {}, resource_api_version: V3 }
  lds_config: { ads: {}, resource_api_version: V3 }
static_resources:
  clusters:
    - name: xds_cluster
      type: STRICT_DNS
      connect_timeout: 5s
      dns_lookup_family: V4_PREFERRED
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config: { http2_protocol_options: {} }
      load_assignment:
        cluster_name: xds_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: __LLMXY_CONTROL_PLANE_HOST__
                      port_value: __LLMXY_XDS_PORT__
    - name: als_cluster
      type: STRICT_DNS
      connect_timeout: 5s
      dns_lookup_family: V4_PREFERRED
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config: { http2_protocol_options: {} }
      load_assignment:
        cluster_name: als_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: __LLMXY_CONTROL_PLANE_HOST__
                      port_value: __LLMXY_ALS_PORT__
